name: Build

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o proxy_ob-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: proxy_ob-${{ matrix.goos }}-${{ matrix.goarch }}
          path: proxy_ob-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Rename binaries
        run: |
          ls -la artifacts/
          mv artifacts/proxy_ob-linux-amd64 proxy_ob-linux-amd64
          mv artifacts/proxy_ob-windows-amd64.exe proxy_ob-windows-amd64.exe
          mv artifacts/proxy_ob-darwin-arm64 proxy_ob-darwin-arm64
          mv artifacts/proxy_ob-darwin-amd64 proxy_ob-darwin-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            proxy_ob-linux-amd64
            proxy_ob-windows-amd64.exe
            proxy_ob-darwin-arm64
            proxy_ob-darwin-amd64
